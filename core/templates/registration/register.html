<!-- templates/registration/register.html -->
{% extends "terminal_base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-panel border border-gray-800 p-8 shadow-2xl relative overflow-hidden">
        <!-- Decorative top bar -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-info to-transparent opacity-50"></div>
        
        <div class="mb-6">
            <h3 class="text-xl font-bold text-info mb-1">> New User Registration</h3>
            <p class="text-xs text-gray-500">Create a new secure identity.</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <style>
                form p { margin-bottom: 1rem; }
                form label { display: block; color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.25rem; }
                form input { 
                    width: 100%; 
                    background-color: #0b0f14; 
                    border: 1px solid #374151; 
                    color: #e5e7eb; 
                    padding: 0.5rem; 
                    font-family: 'JetBrains Mono', monospace;
                    outline: none;
                }
                form input:focus { border-color: #38bdf8; box-shadow: 0 0 0 1px #38bdf8; }
                form .helptext { display: block; font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem; }
                form ul.errorlist { color: #ef4444; font-size: 0.875rem; list-style: none; padding: 0; margin-bottom: 0.5rem; }
            </style>
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-info/10 border border-info text-info hover:bg-info hover:text-bg font-bold py-2 px-4 transition-all duration-200 mt-4 flex items-center justify-center gap-2">
                <span>REGISTER IDENTITY</span>
                <span class="animate-pulse">_</span>
            </button>
        </form>

        <div class="mt-6 text-center border-t border-gray-800 pt-4">
            <p class="text-sm text-gray-500">Already have an account? <a href="{% url 'login' %}" class="text-accent hover:underline decoration-dashed underline-offset-4">[ Login ]</a></p>
        </div>
    </div>
</div>
{% endblock %}
