{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchSec Console</title>
    
    <!-- Fonts: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#0b0f14',
                        panel: '#0f1620',
                        text: '#e5e7eb',
                        accent: '#22c55e',
                        warning: '#f59e0b',
                        error: '#ef4444',
                        info: '#38bdf8',
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'JetBrains Mono', monospace; }
        /* Terminal Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f14; }
        ::-webkit-scrollbar-thumb { background: #1f2937; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>
</head>
<body class="bg-bg text-text min-h-screen flex flex-col font-mono selection:bg-accent selection:text-bg">

    <!-- Navbar -->
    <header class="border-b border-gray-800 bg-panel/50 backdrop-blur-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-accent font-bold text-xl">>_</span>
                <a href="{% url 'dashboard' %}" class="font-bold text-lg tracking-tight hover:text-accent transition-colors">ArchSec</a>
            </div>
            
            <nav class="flex items-center gap-6 text-sm">
                {% if user.is_authenticated %}
                    <span class="text-gray-500">user: <span class="text-info">{{ user.username }}</span></span>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="hover:text-error transition-colors">[ Logout ]</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-accent transition-colors">[ Login ]</a>
                    <a href="{% url 'register' %}" class="hover:text-accent transition-colors">[ Register ]</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center text-xs text-gray-600">
            <p>ArchSec Console v1.0.0 | System Status: <span class="text-accent">ONLINE</span></p>
        </div>
    </footer>
</body>
</html>
